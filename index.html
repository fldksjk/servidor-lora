<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LoRa Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    #chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 60%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      align-self: flex-end;
      background: #dcf8c6;
    }

    .other {
      align-self: flex-start;
      background: white;
    }

    #inputBox {
      display: flex;
      height: 10vh;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100px;
      border: none;
      background: #25d366;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Escribe un mensaje..." />
  <button onclick="enviar()">Enviar</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
// 🔥 conexión estable
const socket = io("http://192.168.0.4:3000", {
  transports: ["websocket"],
  reconnection: false
});

// 🧠 ID dinámico (guardado)
let myId = localStorage.getItem("id");

if (!myId) {
  myId = prompt("¿Eres A o B?").toUpperCase();
  localStorage.setItem("id", myId);
}

// 👀 debug conexión
socket.on("connect", () => {
  console.log("🟢 Conectado:", socket.id);
});

// 📤 enviar mensaje
function enviar() {
  const input = document.getElementById("msg");
  const text = input.value;

  if (!text) return;

  const to = myId === "A" ? "B" : "A";

  socket.emit("enviar_mensaje", {
    from: myId,
    to: to,
    msg: text
  });

  // mostrar solo una vez (propio)
  agregarMensaje(text, "me");

  input.value = "";
}

// 📥 recibir mensaje
socket.on("nuevo_mensaje", (data) => {
  // evitar duplicados (solo mostrar si es del otro)
  if (data.from !== myId) {
    agregarMensaje(data.msg, "other");
  }
});

// 🧱 render mensaje
function agregarMensaje(texto, tipo) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("msg", tipo);
  div.textContent = texto;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔔 notificaciones
Notification.requestPermission();
</script>

</body>
</html>
