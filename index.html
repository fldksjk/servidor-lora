<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LoRa Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    #chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 60%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      align-self: flex-end;
      background: #dcf8c6;
    }

    .other {
      align-self: flex-start;
      background: white;
    }

    #inputBox {
      display: flex;
      height: 10vh;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100px;
      border: none;
      background: #25d366;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Escribe un mensaje..." />
  <button onclick="enviar()">Enviar</button>
</div>

<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>

<script>
// ========================
// IDENTIDAD (A o B)
// ========================
let myId = localStorage.getItem("chat_id");

if (!myId) {
  myId = prompt("Escribe tu ID (A o B):");
  localStorage.setItem("chat_id", myId);
}

// ========================
// CONEXIÓN SOCKET
// ========================
const socket = io();

// ========================
// ENVIAR MENSAJE
// ========================
function enviar() {
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  const to = myId === "A" ? "B" : "A";

  socket.emit("enviar_mensaje", {
    from: myId,
    to: to,
    msg: text
  });

  agregarMensaje(text, "me");
  input.value = "";
}

// ========================
// RECIBIR MENSAJES
// ========================
socket.on("nuevo_mensaje", (data) => {
  if (data.from !== myId) {
    agregarMensaje(data.msg, "other");
  }
});

// ========================
// MOSTRAR MENSAJE
// ========================
function agregarMensaje(texto, tipo) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("msg", tipo);
  div.textContent = texto;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ========================
// DEBUG
// ========================
socket.on("connect", () => {
  console.log("🟢 Conectado al servidor");
});

socket.on("disconnect", () => {
  console.log("🔴 Desconectado");
});
</script>

</body>
</html>
